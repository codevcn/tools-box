runner_tool:
  flags:
    - flag: "-h / --help"
      description: "In help ra terminal."
    - flag: "-m / --message"
      description: "Truyền message cho script ngoài (dùng cho git commit)."
    - flag: "-a / --antigravity-IDE"
      description: "Dùng Antigravity IDE thay vì VSCode."
    - flag: "-p / --powershell-only"
      description: "Chỉ mở folder trong Windows Terminal, không mở IDE."

  types:
    - name: "open"
      description: "Mở trong System Explorer"
      actions:
        - id: "ACTION 01"
          title: "Mở runner files trong VSCode"
          command: "runner open"
          summary: "Mở thư mục gốc của runner project trong IDE."
          details: "Chạy `code <RUNNER_ROOT_FOLDER>` hoặc `anti <RUNNER_ROOT_FOLDER>` tùy theo flag `-a`."
          conditions: "Không có điều kiện đặc biệt."
        - id: "ACTION 02"
          title: "Mở VSCode Workspaces trong System Explorer"
          command: "runner open ws"
          summary: "Mở thư mục chứa các VSCode workspace trong File Explorer."
          details: "Chạy `start D:/D-Documents/VSCode-Workspaces`."
          conditions: "Thư mục `D:/D-Documents/VSCode-Workspaces` phải tồn tại."
        - id: "ACTION 03"
          title: "Mở Environment Variables Panel"
          command: "runner open env"
          summary: "Mở panel Environment Variables của Windows."
          details: "Chạy `rundll32.exe sysdm.cpl,EditEnvironmentVariables`."
          conditions: "Chỉ hoạt động trên Windows."
        - id: "ACTION 04"
          title: "Mở Prompts Folder"
          command: "runner open proms"
          summary: "Mở thư mục Prompts của Template Replacer Extension trong File Explorer."
          details: "Chạy `start <TEMPLATE_REPLACER_FOLDER_PATH>/Prompts`."
          conditions: "Biến môi trường `TEMPLATE_REPLACER_FOLDER_PATH` phải được cấu hình trong `.env`."

    - name: "code"
      description: "Mở trong IDE"
      actions:
        - id: "ACTION 05"
          title: "Mở runner files trong IDE"
          command: "runner code"
          summary: "Mở thư mục gốc của runner project trong IDE."
          details: "Chạy `code <RUNNER_ROOT_FOLDER>` hoặc `anti ...` tùy flag `-a`."
          conditions: "Không có điều kiện đặc biệt."
        - id: "ACTION 06"
          title: "Mở Working Workspace"
          command: "runner code ws <value>"
          summary: "Mở một working workspace cụ thể trong IDE và terminal."
          details: "Gọi `runner_main_ws.py` với <value>. `ptb` → Mở Photobooth project (terminal tabs ptm + recover-image, IDE, Chrome localhost:3000 + AI tabs). `tool` → Mở gdrive-tool project (terminal tab sync-with-gdrive, IDE, Chrome AI tab)."
          conditions: "<value> phải là `ptb` hoặc `tool`. Cần Chrome và Windows Terminal (`wt`) đã cài."
        - id: "ACTION 07"
          title: "Mở Testing Folder"
          command: "runner code test"
          summary: "Mở thư mục Testing chung trong IDE."
          details: "Chạy `code D:/D-Documents/Testing`."
          conditions: "Không có điều kiện đặc biệt."
        - id: "ACTION 08"
          title: "Mở TypeScript Template"
          command: "runner code ts-template"
          summary: "Mở thư mục template Express server TypeScript trong IDE."
          details: "Chạy `code D:/D-Documents/Templates/standard-express-server-ts`."
          conditions: "Thư mục template phải tồn tại."
        - id: "ACTION 09"
          title: "Mở Testing JS/TS Folder"
          command: "runner code js | runner code ts"
          summary: "Mở thư mục testing JavaScript/TypeScript trong IDE."
          details: "Chạy `code D:/D-Documents/Testing/js-ts`."
          conditions: "Không có điều kiện đặc biệt."
        - id: "ACTION 10"
          title: "Mở NestJS Template"
          command: "runner code nestjs"
          summary: "Mở thư mục NestJS template trong IDE."
          details: "Chạy `code D:/D-Documents/Code_VCN/nestjs`."
          conditions: "Không có điều kiện đặc biệt."
        - id: "ACTION 11"
          title: "Mở Testing Python Folder"
          command: "runner code py"
          summary: "Mở thư mục testing Python trong IDE."
          details: "Chạy `code D:/D-Documents/Testing/py`."
          conditions: "Không có điều kiện đặc biệt."
        - id: "ACTION 12"
          title: "Mở Browser Extensions Folder"
          command: "runner code ext"
          summary: "Mở thư mục chứa các browser extension trong IDE."
          details: "Chạy `code D:/D-Documents/Browser-Extensions`."
          conditions: "Không có điều kiện đặc biệt."

    - name: "git"
      description: "Thao tác Git"
      actions:
        - id: "ACTION 13"
          title: "Git Commit & Push"
          command: 'runner git commit -m "message"'
          summary: "Tự động `git add .`, `git commit`, `git push` trong một terminal mới."
          details: 'Mở Windows Terminal tab mới (dùng `wt nt`) tại thư mục `RUNNER_ROOT_FOLDER`, chạy `git add . && git commit -m "..." && git push origin main`.'
          conditions: 'Flag `-m "message"` là bắt buộc. Cần `git` và Windows Terminal (`wt`) đã cài. Repo phải đã có remote `origin`.'

    - name: "run"
      description: "Thực thi script"
      actions:
        - id: "ACTION 14"
          title: "Chạy Test Batch File"
          command: "runner run test-bat"
          summary: "Chạy file batch test (`runner_test.py`)."
          details: "Gọi `python runner_test.py`."
          conditions: "File `runner_test.py` phải tồn tại trong thư mục src."
        - id: "ACTION 15"
          title: "Chạy UniKey"
          command: "runner run unikey"
          summary: "Khởi động ứng dụng gõ tiếng Việt UniKey."
          details: "Chạy `start C:/Users/dell/Downloads/UniKeyNT.exe`."
          conditions: "File `UniKeyNT.exe` phải tồn tại tại đường dẫn cứng trong code."
        - id: "ACTION 16"
          title: "Tạo Files từ Template"
          command: "runner run cr-files"
          summary: "Tạo file/folder từ danh sách template định nghĩa sẵn trong `files_source.txt`."
          details: "Đọc file `contents/files_source.txt` theo cú pháp `file-name[[name]]{{filename}} file-content{{content}}`. Hiển thị menu cho người dùng chọn (nhập số, cách nhau bởi dấu cách). Tạo file/folder tại thư mục hiện tại của terminal (`os.getcwd()`). Hỗ trợ tạo nested folder tự động."
          conditions: "File `contents/files_source.txt` phải tồn tại và có đúng cú pháp template. Script chạy interactive (cần input từ người dùng)."
        - id: "ACTION 17"
          title: "Đặt Download Path trong Chrome"
          command: "runner run dld-path [<folder_name>]"
          summary: "Thay đổi thư mục download mặc định của Chrome cho tất cả profile."
          details: "Nếu có <folder_name>: tạo folder `D:/D-Downloads/<folder_name>` và set làm download dir. Nếu không có: tự động tạo folder `D:/D-Downloads/download-{N}` với N tăng dần. Backup file `Preferences` của từng Chrome profile trước khi ghi (định dạng `.bak.YYYYMMDD-HHMMSS`). Cập nhật `download.default_directory` trong `Preferences` JSON của tất cả Chrome profile (`Default` và `Profile N`)."
          conditions: "Chrome phải được tắt hoàn toàn trước khi chạy (script tự kiểm tra `chrome.exe` trong `tasklist` và cảnh báo nếu Chrome đang chạy). Chrome User Data phải tồn tại tại `C:/Users/dell/AppData/Local/Google/Chrome/User Data`."
        - id: "ACTION 18"
          title: "Format Subtitle TXT → SRT"
          command: "runner run fm-sub <value>"
          summary: "Chuyển đổi file phụ đề định dạng TXT sang SRT."
          details: "Gọi `sub-youtube-video/format_subtitle_txt_to_srt.py` với <value> là đường dẫn file."
          conditions: "<value> (đường dẫn file TXT) là bắt buộc."
        - id: "ACTION 19"
          title: "Edit Prompts"
          command: "runner run proms"
          summary: "Mở thư mục prompts của Template Replacer Extension bằng lệnh batch."
          details: "Chạy file `edit-prompts.cmd` trong `TEMPLATE_REPLACER_FOLDER_PATH`."
          conditions: "Biến môi trường `TEMPLATE_REPLACER_FOLDER_PATH` phải được cấu hình. File `edit-prompts.cmd` phải tồn tại."
        - id: "ACTION 20"
          title: "Rename Files"
          command: "runner run rn-files <folder_path> [<prefix>]"
          summary: "Đổi tên toàn bộ file trong folder theo dạng `<prefix>-1.ext`, `<prefix>-2.ext`, ..."
          details: "Bước 1 - Xác định prefix: Nếu <prefix> được cung cấp và không rỗng thì dùng trực tiếp. Nếu <prefix> rỗng hoặc không có thì tự động phát hiện từ các file có dạng <prefix>-<number>.<ext> (yêu cầu ít nhất 2 file cùng pattern; nếu có nhiều prefix valid thì chọn cái có nhiều file nhất). Nếu không detect được thì báo lỗi và thoát. Bước 2 - Đổi tên 2 giai đoạn: Đổi sang tên tạm __tmp_N__ trước, sau đó đổi sang tên đích (tránh conflict). Chỉ xử lý file cấp 1 (không đệ quy). File được sort trước khi đổi tên."
          conditions: "<folder_path> phải là thư mục hợp lệ. Nếu không truyền prefix thì folder phải có ít nhất 2 file khớp pattern `<prefix>-<number>.<ext>`."
        - id: "ACTION 21"
          title: "Delete Files by Extensions"
          command: "runner run del-files <folder_path> <ext1,ext2,...>"
          summary: "Xóa tất cả file có extension nằm trong danh sách chỉ định."
          details: 'Nhận vào một chuỗi extension ngăn cách bởi dấu phẩy (vd: "txt,jpg,png"). Lặp qua từng extension, chuẩn hóa (strip dấu chấm, lowercase), glob toàn bộ file khớp và xóa. In [DELETED] hoặc [FAILED] cho từng file. Tổng kết ở cuối. Chỉ xử lý file cấp 1 trong folder (không đệ quy).'
          conditions: "<folder_path> phải là thư mục hợp lệ và tồn tại. Cả 2 tham số đều bắt buộc."
        - id: "ACTION 22"
          title: "Keep Files by Extension"
          command: "runner run keep-files <folder_path> <ext>"
          summary: "Giữ lại chỉ các file có extension chỉ định, xóa toàn bộ file còn lại trong folder."
          details: 'Nhận 1 extension duy nhất (vd: "png"). Liệt kê tất cả file trong folder, lọc ra những file không có extension đó và xóa. In [DELETED] hoặc [FAILED] cho từng file. Tổng kết số file xóa / thất bại / giữ lại. Chỉ xử lý file cấp 1 (không đệ quy).'
          conditions: "<folder_path> phải là thư mục hợp lệ. Cả 2 tham số đều bắt buộc. Chỉ nhận 1 extension (khác với del-files nhận nhiều)."

    - name: "print"
      description: "In thông tin"
      actions:
        - id: "ACTION 23"
          title: "In OS Info"
          command: "runner print os"
          summary: "In thông tin hệ thống của máy tính."
          details: "Chạy `systeminfo`, `wmic cpu get name`, `ipconfig` và lọc ra các thông tin quan trọng (OS Name, OS Version, System Manufacturer, System Model, System Type/BIOS, Total/Available Physical Memory, Virtual Memory, CPU Name, IPv4/IPv6 addresses)."
          conditions: "Chỉ hoạt động trên Windows (dùng `systeminfo`, `wmic`, `ipconfig`)."
        - id: "ACTION 24"
          title: "In Runner Statuses Info"
          command: "runner print stts"
          summary: "In mô tả các runner status code."
          details: "Đọc và in file `contents/statuses.txt`."
          conditions: "File `contents/statuses.txt` phải tồn tại. Biến `CONTENTS_FOLDER_PATH` phải được cấu hình."
        - id: "ACTION 25"
          title: "In VSCode Workspaces"
          command: "runner print ws"
          summary: "In danh sách các VSCode workspace file trong thư mục Workspaces."
          details: "Gọi `useful-codes/print_vcnbat_folder.py` với đường dẫn `D:/D-Documents/VSCode-Workspaces`."
          conditions: "Thư mục `D:/D-Documents/VSCode-Workspaces` phải tồn tại."
        - id: "ACTION 26"
          title: "In cURL Reference"
          command: "runner print curl"
          summary: "In tài liệu tham chiếu cú pháp cURL (CRUD)."
          details: "Đọc và in file `contents/cURL.txt`."
          conditions: "File `contents/cURL.txt` phải tồn tại. Biến `CONTENTS_FOLDER_PATH` phải được cấu hình."
        - id: "ACTION 27"
          title: "In Runner Directory Path"
          command: "runner print dir"
          summary: "In đường dẫn tuyệt đối của thư mục runner src."
          details: "Gọi `os.path.dirname(os.path.abspath(__file__))` và in ra terminal."
          conditions: "Không có điều kiện đặc biệt."
        - id: "ACTION 28"
          title: "In Useful Commands"
          command: "runner print cmds"
          summary: "In danh sách các lệnh hữu ích thường dùng."
          details: "Đọc và in file `contents/list_useful_commands.txt`."
          conditions: "File `contents/list_useful_commands.txt` phải tồn tại. Biến `CONTENTS_FOLDER_PATH` phải được cấu hình."
        - id: "ACTION 29"
          title: "In Help"
          command: "runner | runner -h"
          summary: "In hướng dẫn sử dụng runner tool."
          details: "Đọc và in file `contents/help.txt`."
          conditions: "File `contents/help.txt` phải tồn tại."

    - name: "scripts"
      description: "Scripts độc lập (không qua runner CLI)"
      actions:
        - id: "ACTION 30"
          title: "Generate YouTube Subtitle (SRT)"
          file: "useful-codes/sub-youtube-video/gen_sub_file.py"
          summary: "Tải phụ đề tiếng Anh từ YouTube và dịch sang tiếng Việt bằng Gemini AI, xuất file `.srt`."
          details: "Đọc YouTube link từ file `input/video_config.txt` (key `youtube_video_link`). Dùng `youtube_transcript_api` để fetch phụ đề tiếng Anh. Tóm tắt nội dung video qua Gemini (đọc từ `input/video_summary.md` nếu đã có, gọi API nếu chưa). Chia phụ đề thành các chunk (`TRANSLATE_CHUNK_SIZE`), dịch từng chunk qua Gemini API. Retry tự động (tối đa 3 lần) với delay đọc từ error message khi bị rate limit. Nếu chunk thất bại thì fallback giữ nguyên text tiếng Anh. Xuất file SRT ra `result/vietsub_<video_id>.srt`."
          conditions: "Biến môi trường `GEMINI_API_KEY`, `GEMINI_MODEL`, `TRANSLATE_CHUNK_SIZE` phải được cấu hình. Video YouTube phải có phụ đề tiếng Anh. Cần thư viện `youtube_transcript_api`, `google-genai`."
        - id: "ACTION 31"
          title: "Convert PNG to SVG"
          file: "useful-codes/convert_png_to_svg.py"
          summary: "Chuyển đổi ảnh PNG sang SVG vector bằng thư viện `vtracer`."
          details: "Input `input.png` (cứng trong code, cùng thư mục). Output `output.svg` (cùng thư mục). Dùng mode `spline` + `color` để tạo SVG nhiều màu, đường cong mềm. Tham số: `filter_speckle=4`, `color_precision=6`, `layer_difference=16`, `corner_threshold=60`, `max_iterations=10`."
          conditions: "Thư viện `vtracer` phải được cài (`pip install vtracer`). File `input.png` phải tồn tại cùng thư mục với script."

config:
  ROOT_FOLDER_PATH: "Đường dẫn gốc của runner project."
  USEFUL_CODES_FOLDER_PATH: "Đường dẫn đến thư mục `useful-codes`."
  CONTENTS_FOLDER_PATH: "Đường dẫn đến thư mục `contents`."
  TEMPLATE_REPLACER_FOLDER_PATH: "Đường dẫn đến extension Template Replacer."
  GEMINI_API_KEY: "API key của Google Gemini (cho subtitle generator)."
  GEMINI_MODEL: "Tên model Gemini sử dụng."
  TRANSLATE_CHUNK_SIZE: "Số dòng phụ đề mỗi lần gửi API."
